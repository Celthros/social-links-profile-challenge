<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- displays site properly based on user's device -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
		  rel="stylesheet">
	<link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
	<link rel="preload" href="style.min.css" as="style" onload="this.rel='stylesheet'">
	<noscript><link rel="stylesheet" href="style.min.css"></noscript>
	<title>Frontend Mentor | Social links profile</title>
</head>
<body>
	<section class="social__profile">
		<figure  class="social__profile__figure">
			<img class="social__profile__img" alt="Jessica Randall's GitHub profile" src="assets/images/avatar-jessica.jpeg" width="88" height="88" alt="Victor Crest">
		</figure>
		<div class="social__profile__info">
			<h1>Jessica Randall</h1>
			<p>London, United Kingdom</p>
		</div>

		<div class="social__profile__description">
			<p>"Front-end developer and avid reader."</p>
		</div>

		<div class="social__profile__buttons">
			<a href="#" class="social__profile__button" aria-label="Visit Celthros’s GitHub profile">GitHub</a>
			<a href="#" class="social__profile__button" aria-label="Frontend Mentor">Frontend Mentor</a>
			<a href="#" class="social__profile__button" aria-label="LinkedIn">LinkedIn</a>
			<a href="#" class="social__profile__button" aria-label="Twitter">Twitter</a>
			<a href="#" class="social__profile__button" aria-label="Instagram">Instagram</a>
		</div>
	</section>
</body>
</html>
